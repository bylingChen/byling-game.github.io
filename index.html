<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>拼图小游戏</title><link rel="stylesheet" href="style.css"></head><body><div class="container"><h1>拼图小游戏</h1><div class="settings-panel" id="settingsPanel"><div class="upload-section"><label class="upload-btn"><input type="file" id="imageInput" accept="image/*" hidden>选择图片</label><div class="preview-container" id="previewContainer"><img id="previewImage" alt="预览"></div></div><div class="difficulty-section"><h3>选择难度</h3><div class="difficulty-options"><label class="option-btn"><input type="radio" name="difficulty" value="3" checked>33 (简单)</label><label class="option-btn"><input type="radio" name="difficulty" value="4">44 (困难)</label></div></div><button class="start-btn" id="startBtn" disabled>开始游戏</button></div><div class="game-panel" id="gamePanel" style="display: none;"><div class="game-info"><div class="timer">计时：<span id="timerDisplay">00:00</span></div><button class="restart-btn" id="restartBtn">重新开始</button></div><div class="puzzle-container" id="puzzleContainer"></div><div class="original-image" id="originalImage"><h4>原图参考</h4><img id="referenceImage" alt="参考图"></div></div><div class="modal" id="completionModal" style="display: none;"><div class="modal-content"><h2>恭喜完成！</h2><div class="share-card" id="shareCard"><div class="card-header"><h3>拼图挑战完成</h3></div><div class="card-body"><img id="cardImage" alt="完成拼图"><div class="card-info"><p><strong>难度：</strong><span id="cardDifficulty"></span></p><p><strong>完成时间：</strong><span id="cardTime"></span></p></div></div><div class="card-footer"><p>拼图小游戏</p></div></div><div class="modal-actions"><button class="share-btn" id="shareBtn">分享</button><button class="play-again-btn" id="playAgainBtn">再玩一次</button></div></div></div></div><script src="script.js"></script></body></html>
